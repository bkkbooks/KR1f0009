body:
  text: 孝經述注明項霦撰此書孔子傳道與曽子本㫖初言孝之綱領始終及天子諸侯卿大夫士庶人之孝中復次第申言以紬繹其義末言臣子及天下之通孝以終焉曽子門人記録尊之曰經凡十有八章舊本頗有錯簡今從古文更加次第訂正略為訓詁以便初學仲尼閒居曽子侍坐子曰參先王有至德要道以順天下民用和睦上下無怨女知之乎曽子避席曰參不敏何足以知之孔子有聖德而無其位知道不行故于閒居啓發問端欲以古聖王相傳之道授于曽子曽子警悟即離席拱聽敬受其㫖與大學中庸論語篇首所記略同四書皆孔門傳授若合符節真萬代不刋之典嗚呼至哉蓋自太初一元之氣包含真性性即理也以其天賦與人得之具于心而不失故曰德至者極至無以加尚之稱以其循率此德性而行若由大路然故曰道要者總要不紊之謂道德名二而理一聖人因人心本然自有之德性道理以順天下父子君臣夫婦長幼朋友上下和睦無怨皆由孝道始子曰夫孝德之本教之所由生復坐吾語女五常之中仁為心德總要而主慈愛愛莫大于愛親故孝為德性之根本至于立政教以化治天下皆由教道出然德教二字雖總括一書之綱領而其節目非一言可盡故令曽子還坐而語之如下文諸章所云身體髮膚受之父母不敢毁傷孝之始也立身行道揚名於後世以顯父母孝之終也謹守本分保全承受父母生育之遺體此孝道之有始也明自已德性至于成立及措諸事業揚名顯親此孝道之有終也夫孝始於事親中於事君終於立身大雅云無念爾祖聿修厥德此通結上文孝道始終之義蓋事親事君皆本然之德性能修其德則能立身矣故引詩言豈不思念爾祖父遂修厥德以光顯之乎勉其及時立身也而戒其無或失德以忝厥祖之意亦見于言表矣古人語多引詩斷章取義通而不固優游詠歌使自得之故其感人也深後凡引詩放此右第一章言孝之綱領始終子曰愛親者不敢惡於人敬親者不敢慢於人愛敬盡於事親而德教加於百姓刑于四海蓋天子之孝甫刑曰一人有慶兆民賴之君王身為百姓標凖盡人倫之至可以建皇極自然上行下效使人人皆克愛敬其親即由己之不惡不慢所推老吾老以及人之老幼吾幼以及人之幼此之謂也不言郊祀者蓋謂德教廣被措時雍熙天地宗廟百神咸享可知復申于第十六章合而觀之其義備矣又引書言天子一人有大福慶則被于四海萬姓咸承恩托䕃以遂其生育教誨之樂而拳拳諷諫之意亦見于言表云或失德無道則亂亡相尋民罹其禍患父母妻子不能相保全尚何賴焉君天下者宜鍳于兹右第二章言天子之孝子曰在上不驕髙而不危制節謹度滿而不溢髙而不危所以長守貴滿而不溢所以長守富富貴不離其身然後能保其社稷而和其民人蓋諸侯之孝詩云戰戰兢兢如臨深淵如履薄冰古公侯伯子男皆一國之君自封建廢今為方伯牧守矣諸侯列爵分土富貴隨身能守法不驕斯可長保也社土神稷榖神土穀養民故凡建國則立壇祀之與國存亡不及宗廟者舉重而言引詩以寓警戒戰兢臨深履薄皆不敢荒寧放逸之意所以喻富貴之難保凛然可懼然其善保封疆福及子孫永享其安樂者亦可見矣右第三章言諸侯之孝子曰非先王之法服不敢服非先王之法言不敢道非先王之德行不敢行是故非法不言非道不行口無擇言身無擇行言滿天下無口過行滿天下無怨惡三者備矣然後能守其宗廟蓋卿大夫之孝也詩云夙夜匪懈以事一人卿大夫在朝執政之官凡服御名器皆服類凡議論文辭皆言類得于心曰德措諸事曰行三者皆當謹守法度不敢踰越禮分其間言行不待選擇自無差失不敢怨憎可見其執德不回守法無二矣引詩戒警而言其早夜之弗遑寧居者以見其所思所為莫非忠君報國之事也右第四章言卿大夫之孝子曰資於事父以事母而愛同資於事父以事君而敬同故母取其愛而君取其敬兼之者父也故以孝事君則忠以敬事長則順忠順不失以事其上然後能保其祿位而守其祭祀蓋士之孝也詩云夙興夜寐無忝爾所生資取也士有祿位之人事母非不敬也而愛心為重事君非不愛也而敬心為重或謂卿大夫士之孝何以異乎蓋古人由始仕至命為大夫為卿自有次第故知卿大夫先為士時已行士之孝士後為卿大夫亦然合而觀之其意備矣引詩警勉其動靜思為之間循率德義以不忝祖父為心也右第五章言士之孝子曰用天之道因地之利謹身節用以養父母此庶人之孝也故自天子已下至於庶人孝無終始而患不及者未之有也右第六章言庶人之孝按第六章原本脫去注文今仍舊第七章原本脫去經文今補入子曰君子之教以孝也非家至而日見之也教以孝所以敬天下之為人父者教以弟所以敬天下之為人兄者教以臣所以敬天下之為人君者詩云豈弟君子民之父母非至德其孰能順民如此其大者乎使各親其親各長其長猶已孝敬之也故引詩優游涵泳其至德而復歎美其盛大如此右第七章申言至德子曰教民親愛莫善於孝教民禮順莫善於弟移風易俗莫善於樂安上治民莫善於禮孝弟禮樂教民之要道四者皆本乎人心自有之德性而非外也其見於親愛曰孝見於恭順曰弟見於敬讓曰禮見於和平曰樂又施之於事君曰忠治民曰政罰其不率教曰刑以至於酬應萬變亦何莫非此道之妙用者乎禮者敬而已矣故敬其父則子悅敬其兄則弟悅敬其君則臣悅敬一人而千萬人悅所敬者寡而悅者衆此之謂要道也禮主敬樂主和惟其敬已之父兄君長有限此禮之所以行也自然天下之子弟臣衆各敬其親長人心和悅則樂之所由生也所敬者至簡人感化悅從者至多非要道而何右第八章申言要道曽子曰甚哉孝之大也子曰夫孝天之經地之義民之行天地之經而民是則之曽子于是聞至德要道之藴奧而嘆美孝道之大故夫子復申明以順天下和睦無怨之義以告之經常也義宜也孝乃天地恆常合宜之理具於人心順奉以行此道貫三才之妙也則天之明因地之義以順天下是以其教不肅而成其政不嚴而治變經言明者以見德性是天之明命聖人依天地明命恆常合宜之道理順天下民心本然自有之德性以設教立政是故不加威猛而致治平因以見道德本心之所自有先王順之無拂焉爾非加作為以强民之所無也先王見教之可以化民也是故先之以博愛而民莫遺其親陳之以德義而民興行先之以敬讓而民不爭道之以禮樂而民和睦示之以好惡而民知禁詩云赫赫師尹民具爾瞻此詳言上文法天地順民心施政教之事教即孝之道道雖一而感化各因其類博愛為仁之用天子君萬邦所及者廣故以身先之而萬民莫不興孝也德義即天命之性聖王因人心所自有者布諸政事故曰陳民皆感化循率而行則為興行矣敬讓為禮之用和睦為樂之本禮樂之感化上下安定風俗丕變不爭即和睦矣又上之好善也有尊賢任能爵賞之政焉其惡惡也有簡不率教及怙終之刑焉所以示勸懲也凡此皆不過法天地以躬行于上順民心以施教于下而已後世之為政者不本諸德義已先無博愛敬讓禮樂好惡之實乃强飾文具陳之道之示之而欲民之興行孝弟不爭和睦勸善懲惡難矣乎故引詩以寓警戒之意師尹牧長之官王所任以施教于民者也右第九章申言以順天下子曰昔者明王之以孝治天下也不敢遺小國之臣而况於公侯伯子男乎故得萬國之歡心以事其先王遺猶失也以天子之尊接見小國之陪臣且不敢失其歡心則于五等國君朝覲燕享禮儀交接其恩意之厚為何如治國者不敢侮於鰥寡而况於士民乎故得百姓之歡心以事其先君無妻曰鰥無夫曰寡無父曰孤無子曰獨皆謂窮民以諸侯之貴且不敢侮慢而施恩焉則其禮遇撫愛士民之厚從可知矣治家者不敢失於臣妾而况於妻子乎故得人之歡心以事其親臣妾家臣婢僕也以家主之嚴御賤𨽻猶不敢失其歡心則于妻子恩義之重不言而喻夫然故生則親安之祭則鬼享之是以天下和平災害不生禍亂不作故明王之以孝治天下也如此詩云有覺德行四國順之此結上文以孝治天下國家之效驗其發明道心之至和何其深切著明也與至是豈惟親安鬼享而措時于春風和氣中無一物不得其樂然後知孝之功用如此故引詩歌詠之覺大也右第十章申言民用和睦上下無怨曽子曰敢問聖人之德其無以加於孝乎子曰天地之性人為貴人之行莫大於孝曽子至是聞天下和睦之效知孝之德性無以加尚而質問焉故孔子復次第申明德教本原及孝道始終之義以告之夫隂陽五行之理氣循環四時以行化育凡生類之有性情者皆本乎天地之情性其間最貴者為人禀五常之全德于心而仁為總要蓋親愛之情自仁中出故孝為百行之原莫有大于此者孝莫大於嚴父嚴父莫大於配天則周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之內各以其職來助祭夫聖人之德又何以加於孝乎承上文推言聖王孝道無以加尚之事昔周公制禮知其祖后稷父文王之德同乎天故于郊祀明堂推以配天配上帝以盡其尊祖嚴父之意非謂歷代天子之祖父無功德者皆可推以配天配上帝然後為孝之大也天以造化之自然而言帝以造化之主宰而言其實一也故親生之膝下以養父母日嚴聖人因嚴以教敬因親以教愛聖人之教不肅而成其政不嚴而治其所因者本也上文既極言孝之大此承嚴父之義復推原孝為德之本云孩提之童無不知愛其親自生育膝下侍奉父母漸長則嚴敬之心日加然其愛其敬皆出乎天性非由矯僞强飾聖人順而導之則民易從所以然者蓋曰孝為人心自有德性之根本也右第十一章申言孝德之本子曰父子之道天性君臣之義父母生之續莫大焉君親臨之厚莫重焉此因孝為德之本以明教之所由生父慈子孝天賦本然之德性君令臣共其義一也父母生育所以續其身君上臨教所以厚其生故恩義之大之重莫有加焉子曰不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮以順則逆民無則焉不在于善而皆在于凶德雖得之君子所不貴凡一章之內重書子曰者若非問答之辭則語有更端故也此言小人逆理失教之事悖違逆也孝本順理而反逆之民無則焉者以其愛敬失倫違逆天理不順無足取法也德本善性而反為凶故雖得位臨民而不足貴者以上無善政下無法守近于喪亡也君子則不然言斯可道行斯可樂德義可尊作事可法容止可觀進退可度以臨其民是以其民畏而愛之則而象之故能成其德教而行其政令詩云淑人君子其儀不忒此言君子順理立教之事言斯可道即言滿天下無口過也行斯可樂即行滿天下無怨惡也凡其言行德義設施威儀動靜無一不本諸天性順乎人情故可尊可法可觀可度以之臨民則民敬之如神明愛之如父母莫不感化悅從以取法焉而立教之道備于此矣所以然者蓋人心所自有之德性以立教故也卒引詩歌詠善人君子之德美其能敬慎威儀不差忒可為民則也右第十二章申言教之所由生子曰孝子之事親居則致其敬養則致其樂病則致其憂喪則致其哀祭則致其嚴五者備矣然後能事親致極也五者極盡事親始終之道故曰能然其敬樂憂哀嚴雖發乎情而皆本乎自然之德性無一毫外假事親者居上不驕為下不亂在醜不爭居上而驕則亡為下而亂則刑在醜而爭則兵此三者不除雖日用三牲之養猶為不孝也人子先能安分保身不貽父母之憂然後得以遂甘㫖奉養之歡醜衆也子曰五刑之屬三千而罪莫大於不孝要君者無上非聖人者無法非孝者無親此大亂之道也承上文不孝而言五刑墨劓剕宫大辟要者挾求之意非者違背之謂君王為百姓主聖人為萬世法父母有生育之恩犯此則為無父無君違法之人刑所必加以致毁傷其身敢不敬與右第十三章申言始於事親及不敢毁傷子曰君子事上進思盡忠退思補過將順其美匡救其惡故上下能相親詩云心乎愛矣遐不謂矣中心藏之何日忘之進仕則思盡自己忠心致君于聖明退間則思補自己過失增益其所不能君欲行善事則開導贊引順承以行之惡事則委曲諫諍正救以止之故君臣上下同心戮力而政教成矣引詩歌詠言臣有真實愛君之心豈謂疏逺而暫忘末二句尤見拳拳愛君不忘之誠此忠厚之至也右第十四章申言中於事君子曰閨門之內具禮矣乎嚴父嚴兄妻子臣妾猶百姓徒役也具備也故禮備於家而治成於國矣在家之嚴父嚴兄即在國之尊君敬長也在國之撫百姓即在家之愛妻子恤其饑寒也在國之御徒役猶在家之有僕妾供使知其勞困也然其敬愛之施雖有親疏先後之倫而無彼我遠近之間故上下能相親睦以致天下和平後世治家國者不達潔矩之道膠蔽親疏妄分彼我昵愛于閨門以恩掩義斂怨于士庶以㬥勝恩故常亂多治少可勝嘆哉子曰君子之事親孝故忠可移於君事兄弟故順可移於長居家理故治可移於官承上文而言以見孝親弟兄忠君順長理家治國之事皆本乎德性無有不通故君子不出家而成教於國是以行成於內而名立於後世矣通結上文以其盡修齊治平之道故能立身揚名顯親右第十五章申言終於立身及揚名於後世以顯父母子曰昔者明王事父孝故事天明事母孝故事地察長幼順故上下治天地明察神明彰矣天地父母一氣貫通明昭著察鑒諦亦該仰觀俯察之義聖王道心純一通明素與天合故于此章推事父母誠敬之心以事天地則仰觀俯察之際宜神祇之昭著鑒諦也以至尊尊卑卑上下和平亦無所往而不貫通益見道心周流如四時之錯行如日月之代明至有不可以言喻故雖天子必有尊也言有父也必有先也言有兄也宗廟致敬不忘親也修身慎行恐辱先也宗廟致敬鬼神著矣承上文申明事父兄宗廟祭祀之義以擴充其踐履刑于四海之盛也孝弟之至通於神明光於四海無所不通詩云自西自東自南自北無思不服通結上文因引詩歌詠而極言其功效之廣大益可見聖王至孝之發用即天地鬼神之變化渾然貫通無所間隔夷夏咸服六合同風莫非至誠之驗也歟右第十六章申言天子之孝曽子曰若夫慈愛恭敬安親揚名參聞命矣敢問子從父之令可謂孝乎曽子至是既悉聞申明孝道之詳已神會心融乃復啓問其餘藴故孔子又告以臣子及天下之通孝以終焉子曰是何言與是何言與昔者天子有爭臣七人雖無道不失其天下諸侯有爭臣五人雖無道不失其國大夫有爭臣三人雖無道不失其家士有爭友則身不離於令名父有爭子則身不陷於不義此斷以孝之大義所以解千載之惑也歷代天子諸侯卿大夫之無道者必至于亡天下敗國家以其有爭臣諫勸正救之能改過遷善故得不失令善也故當不義則子不可以弗爭於父臣不可以弗爭於君故當不義則爭之從父之令又焉得為孝乎通結上文自天子至于庶人一有不義為臣子者必當諫勸救正勿陷君父於惡而以順從為忠孝也右第十七章申言臣子之通孝子曰孝子之喪親哭不偯禮無容言不文服美不安聞樂不樂食㫖不甘此哀戚之情哀戚之情出乎天性自然非假强飾偯哭有餘剩轉曲聲容善容儀以飾觀美凡有一毫矯僞不誠則失其本性矣三日而食教民無以死傷生毁不滅性此聖人之政喪不過三年示民有終聖人順中正以制禮使賢者俯而就之不肖者跂而及之為之棺槨衣衾而舉之陳其簠簋而哀戚之劈踊哭泣而哀送之卜其宅兆而安厝之為之宗廟以鬼享之春秋祭祀以時思之外棺曰槨簠簋祭器劈手擊胸踊足頓地宅兆墳塋也孝子事親始終之道愛敬侍養所以奉其生也棺衾斂葬所以藏其魄也陳奠哭慟所以哀其亡也宗廟祭祀所以安其靈而永孝思也凡養生送死奠祭之義莫不因其本然自有之德性以盡其終身孺慕誠孝之心而已矣生事愛敬死事哀戚生民之本盡矣死生之義備矣孝子之事親終矣總括一書孝道始終之義何其著明周備若斯其至乎右第十八章申言天下之通孝於戲是經賴有神明護衛幸逃秦火之厄運文章照映簡編經緯天地同乎日月真希世至寶聖王建中立極之心法修齊治平之事實粲然具載而人道備於此矣後之受讀者玩索精微以悟道心純一貫通之神妙何啻親炙聖人而傳道統也歟

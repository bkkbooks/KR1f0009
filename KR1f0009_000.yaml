body:
  text: 提要孝經類孝經述注一卷臣等謹案孝經述注一卷明項霦撰霦始末無可考惟江西志載項霦浙江臨海人洪武間為按察司僉事與黃昭原序所言合當即其人也是編用古文孝經本其所詮釋不務為深奧之論而循文衍義按章標旨詞意頗為簡明猶説經家之不支蔓者明史藝文志不著録朱彛尊經義考亦不載其名惟永樂大典僅存此本然編次佚脫以第七章注文入第六章經文下遂使六章無注七章無經今以所佚經文按古文原本補入所佚注文則世無别本無從葺完矣以其沉埋蠧簡之內三百餘年世無能舉其名者今幸際昌期發其光耀亦萬世一時之遭際故特采掇出之俾聞於後不以殘缺而廢焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀孝經述注原序欽惟聖明天子應天啓運肇造區宇薄海內外靡不臣順首建宗廟報本追逺蓋將以孝治天下為子孫帝王萬世之業也嗚呼盛哉于是內設臺憲以振風紀外置察司以糾姦慝法至密矣江西為大藩府物盛人衆獄訟繁滋彰善疸惡樹之風聲非學有經術亷慎明察者不足以與兹選已酉冬乃命安君智來為憲副項君霦郭君永錫共僉憲事受命陛辭玉音懇惻其所付任不亦重乎安君舊歷顯仕有學有猷郭君由神童擢科第纍任繁劇項君家世業儒隱居十有餘載克承父志著書立言其經濟之資蓋可想見矣余以盲病告老寓洪三君之來也乃不鄙而枉顧焉耳其言挹其氣雍容端重意藹如也他日憲從事劉君鼎承憲副之意而致辭曰項君之述作固多難以悉舉今姑取其集書內孝經注一編將廣其傳蓋樂其有關于治道也敢祈一言以冠之余不得辭乃為之言曰孝百行之原行仁之本也德修于身教成家國而化行乎天下此自然之理也故夫子稱舜為大孝而武王周公為天下之達孝然則帝王之治孰有加於孝乎漢文置孝經博士幾致刑措唐太宗以孝弟設科而死囚歸獄氣象雖殊理一而已後世教化不明彛倫攸斁民之犯法也非出於不知則出於不幸不揣其本一切以法繩之刑政日紊民乃不堪是以治日常少而亂日常多也近草廬吳公以孝經分經傳正訛闕為是書之旨粲然明白今項君又為之注正與吳公互相發明其亦可謂勤己君以觀風行部所以發其所用之學逮將信而有徵安君又將鋟梓以播之使江西之民家有是書人有是德悖慢之俗除禮樂之習興所謂振風紀者將於是乎在由是推之天下四海人人有士君子之行則堯舜三代之治必將權輿於此其於聖天子孝治天下之心顧不韙歟昭既慕項君學術之正復嘉憲副公與人為善之美於是乎書前提刑按察使副使臨川黃昭序
